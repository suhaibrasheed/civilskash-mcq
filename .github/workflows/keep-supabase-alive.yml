name: Keep Supabase Alive

on:
  schedule:
    # Fires automatically at 00:00 UTC every 2 days.
    - cron: '0 0 */2 * *'
  workflow_dispatch:
    # Adds a manual execution button in your GitHub dashboard for testing

jobs:
  ping-database:
    runs-on: ubuntu-latest
    steps:
      - name: Send Isolated Ping Request to Supabase
        run: |
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/keep_alive?select=status&id=eq.1" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}")
          
          echo "Supabase API responded with Status Code: $STATUS_CODE"
          
          if [ "$STATUS_CODE" -ne 200 ]; then
            echo "Error: Database connection failed or returned unexpected status."
            exit 1
          fi
