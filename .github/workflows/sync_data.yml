name: Database to Code Sync
on:
  repository_dispatch:
    types: [supabase_content_update]
  workflow_dispatch:

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Run Sync Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/sync_data.js
        
      - name: Commit Changes
        run: |
          git config --global user.name "MCQ Kash Bot"
          git config --global user.email "bot@mcqkash.com"
          git add -A src/question_bank/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: sync database questions" && git push)
